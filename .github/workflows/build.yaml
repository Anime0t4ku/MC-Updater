name: MC-Updater

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 certifi

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          dir

      - name: Build Executable
        working-directory: MC-Updater
        run: pyinstaller --clean --onefile --windowed --name MC-Updater mc_updater.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-Windows-x86_64
          path: MC-Updater/dist/MC-Updater.exe

  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 certifi

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          ls -la

      - name: Build Executable
        working-directory: MC-Updater
        run: pyinstaller --clean --onefile --windowed --name MC-Updater mc_updater.py

      - name: Make Executable
        run: chmod +x MC-Updater/dist/MC-Updater

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-Linux-x86_64
          path: MC-Updater/dist/MC-Updater

  # ============================================================
  # macOS Apple Silicon Build
  # ============================================================
  build-macos:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Confirm Architecture
        run: |
          uname -m

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 certifi

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          ls -la

      - name: Build App Bundle
        working-directory: MC-Updater
        run: |
          pyinstaller --clean --windowed --name MC-Updater mc_updater.py

      - name: Import Developer ID Certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/developer_id_application.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign App Bundle
        working-directory: MC-Updater
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "Developer ID Application: Bjorn Logan (SMNGA44VUR)" \
            "dist/MC-Updater.app"

          codesign --verify --deep --strict --verbose=2 "dist/MC-Updater.app"

      - name: Create DMG
        working-directory: MC-Updater
        run: |
          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R "dist/MC-Updater.app" "dmg-root/"
          ln -s /Applications "dmg-root/Applications"
          hdiutil create \
            -volname "MC-Updater" \
            -srcfolder "dmg-root" \
            -ov \
            -format UDZO \
            "dist/MC-Updater-macOS-Apple-Silicon.dmg"

      - name: Sign macOS DMG
        working-directory: MC-Updater
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application: Bjorn Logan (SMNGA44VUR)" \
            "dist/MC-Updater-macOS-Apple-Silicon.dmg"

          codesign --verify --verbose=2 "dist/MC-Updater-macOS-Apple-Silicon.dmg"

      - name: Notarize macOS DMG
        working-directory: MC-Updater
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/MC-Updater-macOS-Apple-Silicon.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Staple macOS DMG
        working-directory: MC-Updater
        run: |
          xcrun stapler staple "dist/MC-Updater-macOS-Apple-Silicon.dmg"
          xcrun stapler validate "dist/MC-Updater-macOS-Apple-Silicon.dmg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-macOS-Apple-Silicon
          path: MC-Updater/dist/MC-Updater-macOS-Apple-Silicon.dmg

  # ============================================================
  # Pre-release Creation
  # ============================================================
  release:
    name: Create / Update Pre-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List Downloaded Artifacts
        run: |
          find dist -maxdepth 2 -type f -print

      - name: Zip Windows Build
        run: |
          cd dist
          zip ../MC-Updater-Windows-x86_64.zip MC-Updater.exe

      - name: Tar Linux Build
        run: |
          cd dist
          chmod +x MC-Updater
          tar -czf ../MC-Updater-Linux-x86_64.tar.gz MC-Updater

      - name: Copy macOS DMG
        run: |
          cp dist/MC-Updater-macOS-Apple-Silicon.dmg ./MC-Updater-macOS-Apple-Silicon.dmg

      - name: Update Git Tag
        run: |
          git tag -f Pre-release
          git push -f origin Pre-release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: Pre-release
          artifacts: |
            MC-Updater-Windows-x86_64.zip
            MC-Updater-Linux-x86_64.tar.gz
            MC-Updater-macOS-Apple-Silicon.dmg
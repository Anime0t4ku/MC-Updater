name: MC-Updater

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          dir

      - name: Build Executable
        working-directory: MC-Updater
        run: pyinstaller --clean --onefile --windowed --name MC-Updater mc_updater.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-Windows-x86_64
          path: MC-Updater/dist/MC-Updater.exe

  # ============================================================
  # Pre-release Creation
  # ============================================================
  release:
    name: Create / Update Pre-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Zip Windows Build
        run: |
          cd dist
          zip ../MC-Updater-Windows-x86_64.zip MC-Updater.exe

      - name: Update Git Tag
        run: |
          git tag -f Pre-release
          git push -f origin Pre-release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: Pre-release
          artifacts: |
            MC-Updater-Windows-x86_64.zip
name: MC-Updater

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 certifi

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          dir

      - name: Build Executable
        working-directory: MC-Updater
        run: pyinstaller --clean --onefile --windowed --name MC-Updater mc_updater.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-Windows-x86_64
          path: MC-Updater/dist/MC-Updater.exe

  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 certifi

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          ls -la

      - name: Build Executable
        working-directory: MC-Updater
        run: pyinstaller --clean --onefile --windowed --name MC-Updater mc_updater.py

      - name: Make Executable
        run: chmod +x MC-Updater/dist/MC-Updater

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-Linux-x86_64
          path: MC-Updater/dist/MC-Updater

  # ============================================================
  # macOS Apple Silicon Build
  # ============================================================
  build-macos:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Confirm Architecture
        run: |
          uname -m

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 certifi

      - name: List Files
        working-directory: MC-Updater
        run: |
          pwd
          ls -la

      - name: Build App Bundle
        working-directory: MC-Updater
        run: |
          pyinstaller --clean --windowed --name MC-Updater mc_updater.py

      - name: Create DMG
        working-directory: MC-Updater
        run: |
          hdiutil create \
            -volname "MC-Updater" \
            -srcfolder "dist/MC-Updater.app" \
            -ov \
            -format UDZO \
            "dist/MC-Updater-macOS-Apple-Silicon.dmg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Updater-macOS-Apple-Silicon
          path: MC-Updater/dist/MC-Updater-macOS-Apple-Silicon.dmg

  # ============================================================
  # Pre-release Creation
  # ============================================================
  release:
    name: Create / Update Pre-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List Downloaded Artifacts
        run: |
          find dist -maxdepth 2 -type f -print

      - name: Zip Windows Build
        run: |
          cd dist
          zip ../MC-Updater-Windows-x86_64.zip MC-Updater.exe

      - name: Tar Linux Build
        run: |
          cd dist
          chmod +x MC-Updater
          tar -czf ../MC-Updater-Linux-x86_64.tar.gz MC-Updater

      - name: Copy macOS DMG
        run: |
          cp dist/MC-Updater-macOS-Apple-Silicon.dmg ./MC-Updater-macOS-Apple-Silicon.dmg

      - name: Update Git Tag
        run: |
          git tag -f Pre-release
          git push -f origin Pre-release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: Pre-release
          artifacts: |
            MC-Updater-Windows-x86_64.zip
            MC-Updater-Linux-x86_64.tar.gz
            MC-Updater-macOS-Apple-Silicon.dmg